name: Feature Request
description: Suggest a new feature or optimization plugin
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: capability
    attributes:
      label: Plugin Capability Class
      description: See docs/supported-matrix.json for capability definitions
      options:
        - drop_in_safe (native-equivalent output)
        - ranked_preview (may differ from native, opt-in)
        - not a plugin change
